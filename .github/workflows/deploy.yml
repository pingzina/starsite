name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: npm run generate
        env:
          NUXT_PUBLIC_SITE_TITLE: StarSite
          NUXT_PUBLIC_SITE_URL: https://pingzina.github.io/starsite
          NUXT_PUBLIC_DEFAULT_LOCALE: zh
          NUXT_PUBLIC_SEARCH_MODE: metadata
          NUXT_PUBLIC_ASSET_BASE: /
          NUXT_PUBLIC_ENABLE_ANALYTICS: false
          NUXT_PUBLIC_API_BASE: /api
          NUXT_APP_BASE_URL: /starsite/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
